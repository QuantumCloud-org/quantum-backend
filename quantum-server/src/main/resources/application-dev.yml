spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.31.10:15432/baseweb?currentSchema=public&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&autoReconnect=true&rewriteBatchedStatements=true&prepareThreshold=5&stringtype=unspecified
    username: baseweb
    password: "BaseWeb123"
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      max-lifetime: 1800000
      connection-timeout: 30000
      idle-timeout: 600000
      connection-test-query: SELECT 1
  data:
    redis:
      host: 192.168.31.10
      port: 16379
      database: 12
      password: password!
      # Redisson 高级配置
      redisson:
        connection-minimum-idle-size: 8
        connection-pool-size: 32
        connect-timeout: 3000
        timeout: 3000
        retry-attempts: 3
        retry-interval: 1500
        subscription-connection-minimum-idle-size: 1
        subscription-connection-pool-size: 8
        ping-connection-interval: 3000

# MyBatis-Flex 配置
mybatis-flex:
  mapper-locations: classpath*:/mapper/*.xml
  type-aliases-package: com.alpha.**.entity
  global-config:
    print-banner: false
  audit:
    enabled: true
  sql-print:
    enabled: true

# SpringDoc 配置
springdoc:
  enabled: true
  api-docs:
    enabled: true

logging:
  level:
    root: WARN
    # 业务包日志级别
    com.alpha: DEBUG
    # 第三方库级别
    org.springframework: info
    com.mybatis-flex: WARN
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
    com.mybatisflex.core.monitor: DEBUG

security:
  token:
    secret: dev-jwt-secret-2026-04-06-please-change-before-prod-0123456789abcdef
