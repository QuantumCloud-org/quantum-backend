# 服务器配置
server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /wuxi_civil
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 10
spring:
  application:
    name: wuxi_civil_servant
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s
  autoconfigure:
    exclude:
      - org.springframework.boot.devtools.autoconfigure.DevToolsDataSourceAutoConfiguration

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

file:
  # 文件存储配置 local / rustfs
  storage-type: local
  local:
    base-path: /opt/application/files
    domain: http://localhost:8080/api/file
  rustfs:
    endpoint: http://localhost:9000
    access-key: ${RUSTFS_ACCESS_KEY:}
    secret-key: ${RUSTFS_SECRET_KEY:}
    bucket: quantum
    region: cn-north-1
    path-style-access: true

# 缓存模式配置
# redis（默认）：L1 Caffeine + L2 Redis 双级缓存，需配置 spring.data.redis.*
# local：纯 Caffeine 内存缓存，无需 Redis，适用于本地开发/测试环境
cache:
  mode: local

# Security 配置
security:
  xss-enabled: true
  # 允许传 HTML 的富文本字段接口
  #xss-excludes:
  #  - /notice/content
  # 白名单路径
  whitelist:
    - /auth/login
    - /auth/captcha
  # 密码
  password-min-length: 8
  password-max-length: 20
  # 登录失败
  max-login-fail-count: 10
  # 登录失败锁定时间（分钟）
  lock-time: 10
  # Token 配置
  token:
    secret: demo
    access-token-expire: 240
    refresh-token-expire: 240
    single-device: false

# Knife4j配置
knife4j:
  enable: false
  setting:
    language: zh_cn
  # 生产环境关闭
  production: false
